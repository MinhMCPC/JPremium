name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn clean install

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: JPremium
          path: target/*.jar
          retention-days: 14
